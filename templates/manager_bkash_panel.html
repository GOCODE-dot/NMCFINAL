<!--
  ══════════════════════════════════════════════════════════════════════════════
  BKASH PROPOSAL PANEL — paste into manager_dashboard.html
  Suggested location: after the stats cards, before payment tables

  Requires Font Awesome 6 and the toast() function from base.html
  ══════════════════════════════════════════════════════════════════════════════
-->

<style>
  /* ── bKash Panel ─────────────────────────────────────────────────────────── */
  .bkash-panel {
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .bkash-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: #f8fafc;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .bkash-panel-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bkash-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #e2136e, #c0105c);
    border-radius: 12px;
    display: grid;
    place-items: center;
    color: #fff;
    font-size: 18px;
    flex-shrink: 0;
  }
  .bkash-panel-title h3 { font-size: 15px; font-weight: 700; color: var(--text); }
  .bkash-panel-title p  { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .bkash-current-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #fdf0f6;
    border: 1.5px solid #f5a8d0;
    border-radius: 40px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    color: #c0105c;
    letter-spacing: .5px;
  }

  /* Body */
  .bkash-body { padding: 20px 24px; }

  /* Propose form */
  .bkash-propose-form {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .bkash-propose-form .field { flex: 1; min-width: 180px; }
  .bkash-propose-form label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .bkash-propose-form input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--text);
    transition: border .2s;
  }
  .bkash-propose-form input:focus {
    outline: none;
    border-color: #e2136e;
    box-shadow: 0 0 0 3px rgba(226,19,110,.1);
  }
  #bkashProposeBtn {
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, #e2136e, #c0105c);
    color: #fff;
    border: none;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all .2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #bkashProposeBtn:hover { box-shadow: 0 4px 14px rgba(226,19,110,.35); transform: translateY(-1px); }
  #bkashProposeBtn:active { transform: scale(0.98); }
  #bkashProposeBtn.busy { opacity: .6; pointer-events: none; }

  /* Divider */
  .bkash-divider {
    height: 1px;
    background: var(--border);
    margin: 18px 0;
  }

  /* Pending proposals list */
  .proposals-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 12px;
  }
  #bkashProposalsList { display: flex; flex-direction: column; gap: 10px; }

  .proposal-card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    background: #fafbfc;
    transition: border .2s;
  }
  .proposal-card.mine { border-color: #f5a8d0; background: #fdf0f6; }
  .proposal-card.voted { opacity: .75; }

  .proposal-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .proposal-who { font-size: 13px; color: var(--text-muted); }
  .proposal-who strong { color: var(--text); }
  .proposal-bkash {
    font-size: 16px;
    font-weight: 800;
    color: #e2136e;
    letter-spacing: .5px;
  }

  /* Progress bar */
  .vote-bar-wrap { margin-bottom: 10px; }
  .vote-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .vote-bar-track {
    height: 8px;
    background: #f1f5f9;
    border-radius: 8px;
    overflow: hidden;
  }
  .vote-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #10b981, #059669);
    border-radius: 8px;
    transition: width .4s ease;
  }

  /* Vote buttons */
  .vote-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-approve {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    background: var(--primary);
    color: #fff;
    border: none;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
  }
  .btn-approve:hover { background: var(--primary-light); }
  .btn-reject {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--danger);
    border: 1.5px solid var(--danger);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
  }
  .btn-reject:hover { background: var(--danger-light); }
  .voted-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
  }
  .voted-chip.approve { background: var(--primary-pale); color: var(--primary); }
  .voted-chip.reject  { background: var(--danger-light); color: var(--danger); }

  /* Own proposal chip */
  .own-proposal-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #c0105c;
    font-weight: 600;
  }

  /* Empty state */
  .bkash-empty {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .bkash-empty i { font-size: 28px; display: block; margin-bottom: 8px; opacity: .4; }

  /* Recent resolved */
  .resolved-list { margin-top: 16px; }
  .resolved-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .resolved-item:last-child { border-bottom: none; }
  .resolved-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .resolved-badge.approved { background: var(--primary-pale); color: var(--primary); }
  .resolved-badge.rejected { background: var(--danger-light); color: var(--danger); }
  .resolved-badge.cancelled { background: #f1f5f9; color: var(--text-muted); }

  @media(max-width:480px) {
    .bkash-panel-header { padding: 14px 16px; }
    .bkash-body { padding: 16px; }
  }
</style>

<!-- ─── BKASH PROPOSAL PANEL ──────────────────────────────────────────────── -->
<div class="bkash-panel">
  <div class="bkash-panel-header">
    <div class="bkash-panel-title">
      <div class="bkash-icon"><i class="fas fa-mobile-alt"></i></div>
      <div>
        <h3>bKash Number Management</h3>
        <p>Propose a new collection number — requires approval from other managers</p>
      </div>
    </div>
    <div class="bkash-current-badge">
      <i class="fas fa-circle" style="font-size:8px;color:#e2136e"></i>
      Current: <span id="currentBkash">{{ mgr_bkash }}</span>
    </div>
  </div>
  <div class="bkash-body">

    <!-- Propose form -->
    <div class="bkash-propose-form">
      <div class="field">
        <label>Propose New bKash Number</label>
        <input type="tel" id="newBkashInput" placeholder="01XXXXXXXXX" maxlength="11">
      </div>
      <button id="bkashProposeBtn" onclick="proposeBkash()">
        <i class="fas fa-paper-plane"></i> Send Proposal
      </button>
    </div>

    <div class="bkash-divider"></div>

    <!-- Pending proposals -->
    <div class="proposals-title">Pending Proposals</div>
    <div id="bkashProposalsList">
      <div class="bkash-empty"><i class="fas fa-inbox"></i>Loading...</div>
    </div>

    <!-- Recent resolved (collapsible) -->
    <div id="resolvedSection" style="display:none">
      <div class="bkash-divider"></div>
      <div class="proposals-title">Recent History</div>
      <div class="resolved-list" id="resolvedList"></div>
    </div>

  </div>
</div>

<script>
// ── bKash Proposal Panel ──────────────────────────────────────────────────────

let _myManagerId = null;  // set on first load

async function loadBkashProposals() {
  try {
    const res  = await fetch('/manager/bkash_proposals');
    const data = await res.json();
    _myManagerId = data.my_id;
    renderProposals(data.pending, data.resolved);
  } catch(e) {
    document.getElementById('bkashProposalsList').innerHTML =
      '<div class="bkash-empty"><i class="fas fa-exclamation-circle"></i>Could not load proposals.</div>';
  }
}

function renderProposals(pending, resolved) {
  const list = document.getElementById('bkashProposalsList');

  if (!pending.length) {
    list.innerHTML = '<div class="bkash-empty"><i class="fas fa-check-circle"></i>No pending proposals. All good!</div>';
  } else {
    list.innerHTML = pending.map(p => {
      const isOwn    = p.proposer_manager_id === _myManagerId;
      const total    = p.total_managers - 1;  // others excluding proposer
      const needed   = 2;  // only 2 approvals required
      const pct      = total > 0 ? Math.round((p.approve_count / total) * 100) : 100;
      const timeAgo  = formatTimeAgo(p.created_at);

      let voteSection = '';
      if (isOwn) {
        voteSection = `<span class="own-proposal-chip"><i class="fas fa-hourglass-half"></i> Your proposal — waiting for others to vote</span>`;
      } else if (p.my_vote === 'approve') {
        voteSection = `<span class="voted-chip approve"><i class="fas fa-check"></i> You approved</span>`;
      } else if (p.my_vote === 'reject') {
        voteSection = `<span class="voted-chip reject"><i class="fas fa-times"></i> You rejected</span>`;
      } else {
        voteSection = `
          <button class="btn-approve" onclick="voteOnProposal(${p.id},'approve')">
            <i class="fas fa-check"></i> Approve
          </button>
          <button class="btn-reject" onclick="voteOnProposal(${p.id},'reject')">
            <i class="fas fa-times"></i> Reject
          </button>`;
      }

      return `
        <div class="proposal-card ${isOwn ? 'mine' : ''} ${p.my_vote ? 'voted' : ''}" id="prop-${p.id}">
          <div class="proposal-top">
            <div>
              <div class="proposal-bkash"><i class="fas fa-mobile-alt" style="font-size:14px;margin-right:6px"></i>${p.proposed_bkash}</div>
              <div class="proposal-who">Proposed by <strong>${p.proposer_name}</strong> · ${timeAgo}</div>
            </div>
            <div style="font-size:12px;color:var(--text-muted);text-align:right">
              ${p.approve_count}/${needed} needed<br>
              <span style="color:var(--danger)">${p.reject_count} reject${p.reject_count!==1?'s':''}</span>
            </div>
          </div>
          <div class="vote-bar-wrap">
            <div class="vote-bar-label">
              <span>Approvals</span>
              <span>${p.approve_count} / ${total} managers</span>
            </div>
            <div class="vote-bar-track">
              <div class="vote-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="vote-btns">${voteSection}</div>
        </div>`;
    }).join('');
  }

  // Resolved history
  const resolvedSec  = document.getElementById('resolvedSection');
  const resolvedList = document.getElementById('resolvedList');
  if (resolved.length) {
    resolvedSec.style.display = '';
    resolvedList.innerHTML = resolved.map(r => `
      <div class="resolved-item">
        <span class="resolved-badge ${r.status}">${r.status}</span>
        <span style="font-weight:700;color:#e2136e">${r.proposed_bkash}</span>
        <span style="color:var(--text-muted)">by ${r.proposer_name}</span>
        <span style="color:var(--text-muted);margin-left:auto;font-size:12px">${formatTimeAgo(r.resolved_at)}</span>
      </div>`).join('');
  } else {
    resolvedSec.style.display = 'none';
  }
}

async function proposeBkash() {
  const input  = document.getElementById('newBkashInput');
  const btn    = document.getElementById('bkashProposeBtn');
  const bkash  = input.value.trim();

  if (!bkash) { toast('Enter a bKash number first.', 'error'); return; }
  if (!/^01[3-9]\d{8}$/.test(bkash)) { toast('Invalid format — must be 01XXXXXXXXX', 'error'); return; }

  btn.classList.add('busy');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

  try {
    const res  = await fetch('/manager/bkash_propose', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ bkash_number: bkash }),
    });
    const data = await res.json();
    if (data.ok) {
      toast(data.msg, 'success');
      input.value = '';
      if (data.auto_approved) {
        document.getElementById('currentBkash').textContent = bkash;
      }
      await loadBkashProposals();
    } else {
      toast(data.msg, 'error');
    }
  } catch(e) {
    toast('Network error.', 'error');
  } finally {
    btn.classList.remove('busy');
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Proposal';
  }
}

async function voteOnProposal(proposalId, vote) {
  try {
    const res  = await fetch('/manager/bkash_vote', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ proposal_id: proposalId, vote }),
    });
    const data = await res.json();
    if (data.ok) {
      toast(data.msg, data.resolved ? 'success' : 'success');
      await loadBkashProposals();
      // If approved, update the current bKash badge on dashboard
      if (data.resolved && vote === 'approve') location.reload();
    } else {
      toast(data.msg, 'error');
    }
  } catch(e) {
    toast('Network error.', 'error');
  }
}

function formatTimeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = Math.floor((Date.now() - new Date(isoStr + (isoStr.includes('T') ? '' : 'Z'))) / 1000);
  if (diff < 60)   return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

// Load on page ready + poll every 30s
loadBkashProposals();
setInterval(loadBkashProposals, 30000);
</script>
