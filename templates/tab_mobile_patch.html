<!--
══════════════════════════════════════════════════════════════════════════════
  PATCH — manager_dashboard.html
  Two improvements:
    1. Active tab indicator (visible underline so users always know where they are)
    2. Mobile-first responsive overhaul (better spacing, touch targets, layout)

  HOW TO APPLY:
  ─────────────
  Find the existing tab <style> block that starts with the comment:
    /* ── Streamlined tab bar ──────────────────────────────────── */
  It sits around line 481 inside a <style> tag.

  REPLACE that entire <style> block (from the opening <style> to its
  closing </style>) with the <style> block below.

  No HTML or JS changes are needed — this is CSS-only.
══════════════════════════════════════════════════════════════════════════════
-->

<!-- ══ REPLACE the existing tab <style> block WITH THIS ══════════════════ -->
<style>
  /* ═══════════════════════════════════════════════════════════════════════
     TAB BAR — with active indicator + mobile-first layout
  ═══════════════════════════════════════════════════════════════════════ */

  /* ── Outer wrapper ───────────────────────────────────────────────────── */
  .tabs-wrap {
    display: flex;
    align-items: stretch;
    background: var(--tabs-bg, #e8edf2);
    border-radius: 14px;
    padding: 4px;
    gap: 2px;
    margin-bottom: 24px;
    position: relative;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.06);
  }

  /* ── Primary tab row ─────────────────────────────────────────────────── */
  .tabs-primary {
    display: flex;
    flex: 1;
    gap: 2px;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Each tab button ─────────────────────────────────────────────────── */
  .tabs-primary .tab {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    /* ── KEY: bottom border acts as the active indicator ── */
    border-bottom: 3px solid transparent;
    border-radius: 10px 10px 0 0;
    padding: 10px 12px 8px;   /* asymmetric — less on bottom to let the border show */
    transition: border-color .18s, color .18s, background .18s;
    position: relative;
  }

  /* Inactive hover */
  .tabs-primary .tab:hover:not(.active) {
    background: rgba(255,255,255,.55);
    color: var(--text);
    border-bottom-color: rgba(46,125,50,.3);
  }

  /* ✅ Active state — the border makes it unmistakable */
  .tabs-primary .tab.active {
    background: #fff;
    color: var(--primary, #2e7d32);
    border-bottom-color: var(--primary, #2e7d32);
    box-shadow: 0 -1px 0 0 rgba(255,255,255,.9), 0 2px 6px rgba(0,0,0,.07);
    font-weight: 700;
  }

  /* Dark mode */
  [data-theme="dark"] .tabs-primary .tab.active {
    background: var(--tab-active-bg, #252d42);
    border-bottom-color: var(--primary);
  }

  /* ── Three-dots button ───────────────────────────────────────────────── */
  .tab-more-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: auto;
    border-radius: 10px;
    background: transparent;
    border: none;
    font-size: 20px;
    color: var(--text-muted);
    cursor: pointer;
    transition: background .15s, color .15s;
    position: relative;
    letter-spacing: 1px;
  }
  .tab-more-btn:hover,
  .tab-more-btn.open {
    background: rgba(255,255,255,.75);
    color: var(--primary);
  }

  /* ── Red dot on three-dots button ───────────────────────────────────── */
  .tab-more-btn .more-badge {
    position: absolute;
    top: 7px; right: 7px;
    width: 8px; height: 8px;
    background: var(--danger);
    border-radius: 50%;
    display: none;
    box-shadow: 0 0 0 2px var(--tabs-bg, #e8edf2);
  }

  /* ── Overflow dropdown ───────────────────────────────────────────────── */
  .tab-overflow-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 240px;
    background: var(--card, #fff);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,.14);
    z-index: 999;
    overflow: hidden;
    padding: 6px;
  }
  .tab-overflow-menu.open { display: block; }

  .tab-overflow-menu .om-item {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 11px 14px;
    background: transparent;
    border: none;
    border-radius: 9px;
    text-align: left;
    font-family: var(--font-body, inherit);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .tab-overflow-menu .om-item:hover {
    background: var(--primary-pale);
    color: var(--primary);
  }
  .tab-overflow-menu .om-item.active {
    background: var(--primary-pale);
    color: var(--primary);
    border-left: 3px solid var(--primary);
    padding-left: 11px;
  }
  .tab-overflow-menu .om-item i {
    width: 18px;
    text-align: center;
    flex-shrink: 0;
    color: var(--text-muted);
  }
  .tab-overflow-menu .om-item:hover i,
  .tab-overflow-menu .om-item.active i { color: var(--primary); }

  .om-badge {
    margin-left: auto;
    background: var(--danger);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 8px;
    min-width: 22px;
    text-align: center;
    line-height: 1.5;
  }
  .om-separator {
    height: 1px;
    background: var(--border);
    margin: 4px 8px;
  }


  /* ═══════════════════════════════════════════════════════════════════════
     MOBILE OVERHAUL
     Breakpoints: 768px (tablet), 540px (large phone), 400px (small phone)
  ═══════════════════════════════════════════════════════════════════════ */

  /* ── Tablet (≤768px) ─────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    /* Nav */
    .nav-inner { flex-wrap: wrap; gap: 8px; }
    .nav-links  { flex-wrap: wrap; gap: 6px; }
    .nav-links .btn { padding: 6px 10px; font-size: 12px; }

    /* Container padding */
    .container { padding: 0 12px; }

    /* Stats grid → 2 col */
    .grid-4 { grid-template-columns: 1fr 1fr !important; }
    .stat-card { padding: 16px 14px; }
    .stat-value { font-size: 22px !important; }

    /* Tabs */
    .tabs-primary .tab { font-size: 12px; padding: 9px 8px 7px; }
    .tabs-wrap { border-radius: 12px; margin-bottom: 18px; }

    /* Cards */
    .card { border-radius: 10px; }
    .section-card { padding: 0; }

    /* Scrollable tables */
    .week-table-wrap,
    .due-table-wrap,
    .onp-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* Modal */
    .modal { padding: 20px 16px; }
    .proof-actions { flex-direction: column; }

    /* Page header */
    .page-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .page-header h1 { font-size: 22px; }
  }

  /* ── Large phone (≤540px) ────────────────────────────────────────────── */
  @media (max-width: 540px) {
    /* Hide tab icons — label only */
    .tabs-primary .tab i { display: none; }
    .tabs-primary .tab { font-size: 11px; padding: 9px 6px 7px; }

    /* Stats grid → single column */
    .grid-4 { grid-template-columns: 1fr !important; }

    /* Proof/payment cards */
    .proof-card { padding: 14px 12px; }
    .proof-card .proof-actions { gap: 6px; }
    .proof-card .proof-actions .btn { width: 100%; justify-content: center; }

    /* bKash number display */
    .bkash-number-display { font-size: 18px !important; }

    /* Floor modal tabs */
    .floor-modal-tabs { overflow-x: auto; flex-wrap: nowrap; }
    .floor-modal-tabs .tab { flex-shrink: 0; }

    /* Cook sheet table */
    .cook-section table td,
    .cook-section table th { padding: 8px 10px; font-size: 13px; }

    /* Overflow menu → full-width on small screens */
    .tab-overflow-menu {
      position: fixed;
      top: auto;
      bottom: 0;
      left: 0;
      right: 0;
      min-width: unset;
      width: 100%;
      border-radius: 16px 16px 0 0;
      max-height: 70vh;
      overflow-y: auto;
      padding: 8px 8px 24px;
      box-shadow: 0 -8px 40px rgba(0,0,0,.18);
    }
    /* Visual drag handle above sheet */
    .tab-overflow-menu::before {
      content: '';
      display: block;
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 8px auto 12px;
    }
    .tab-overflow-menu .om-item {
      padding: 14px 16px;
      font-size: 15px;
      border-radius: 10px;
    }

    /* Buttons: full-width stacking */
    .btn-row-mobile { flex-direction: column !important; }
    .btn-row-mobile .btn { width: 100%; justify-content: center; }
  }

  /* ── Small phone (≤400px) ────────────────────────────────────────────── */
  @media (max-width: 400px) {
    .tabs-primary { gap: 1px; }
    .tabs-primary .tab { padding: 8px 4px 6px; font-size: 10px; }
    .tab-more-btn { width: 36px; }

    .nav-brand span { font-size: 13px; }
    .container { padding: 0 8px; }

    .stat-card { padding: 14px 12px; }
    .stat-value { font-size: 20px !important; }
  }
</style>
