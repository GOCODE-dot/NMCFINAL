    </button>

  below immediately AFTER it (still inside whatever wrapper holds your panels).

<!-- ── COOK SHEET STYLES ─────────────────────────────────────────────────── -->
<style>
  .cook-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }
  .cook-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--primary);
    color: #fff;
    flex-wrap: wrap;
    gap: 10px;
  }
  .cook-header-left { display: flex; align-items: center; gap: 12px; }
  .cook-header-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 20px; flex-shrink: 0;
  }
  .cook-header h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .cook-header p  { font-size: 12px; opacity: 0.85; }
  .cook-date-bar  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .cook-date-bar input[type="date"] {
    padding: 8px 12px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15); color: #fff;
    font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .cook-date-bar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
  .cook-date-bar input[type="date"]:focus { outline: none; border-color: rgba(255,255,255,0.7); }
  .cook-refresh-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 8px; color: #fff;
    font-family: var(--font-body); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .cook-refresh-btn:hover { background: rgba(255,255,255,0.3); }
  .cook-print-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: #fff; border: none; border-radius: 8px;
    color: var(--primary); font-family: var(--font-body); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .cook-print-btn:hover { background: #e8f5ee; }
  .cook-sheet-body { padding: 20px 24px; }
  .meal-section { margin-bottom: 24px; }
  .meal-section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .meal-section-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: grid; place-items: center; font-size: 18px; flex-shrink: 0;
  }
  .meal-section-icon.lunch  { background: #e6f0ff; }
  .meal-section-icon.dinner { background: #f3e8ff; }
  .meal-section-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .meal-section-total { margin-left: auto; font-size: 22px; font-weight: 800; color: var(--primary); }
  .cook-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: 8px; margin-bottom: 6px;
    font-size: 14px; font-weight: 600;
    background: #f8fafc; border: 1px solid var(--border);
  }
  .cook-row .row-label  { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 13px; font-weight: 600; }
  .cook-row .row-label i { font-size: 12px; }
  .cook-row .row-count  { font-size: 20px; font-weight: 800; color: var(--text); min-width: 40px; text-align: right; }
  .cook-row.total-row   { background: var(--primary-pale); border-color: #b7e4c7; }
  .cook-row.total-row .row-label { color: var(--primary); font-size: 14px; font-weight: 700; }
  .cook-row.total-row .row-count { color: var(--primary); font-size: 24px; }
  .cook-row.female-row  { background: #fce4ec; border-color: #f48fb1; }
  .cook-row.female-row .row-label { color: #c2185b; }
  .cook-row.female-row .row-count { color: #c2185b; }
  .cook-row.floor-row   { background: #f0f7ff; border-color: #b3d1f5; }
  .cook-row.floor-row .row-label { color: #3b5fe2; }
  .cook-row.floor-row .row-count { color: #3b5fe2; }
  .cook-grand-total {
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff; border-radius: var(--radius-sm); padding: 16px 20px; margin-top: 8px;
  }
  .cook-grand-total .gt-label { font-size: 14px; font-weight: 700; opacity: 0.9; }
  .cook-grand-total .gt-count { font-size: 32px; font-weight: 800; }
  .cook-loading {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 40px; color: var(--text-muted); font-size: 14px;
  }

  /* ── PRINT ── */
  @media print {
    @page { size: A5 portrait; margin: 12mm 14mm; }
    body > *:not(#cook-print-target) { display: none !important; }
    #cook-print-target { display: block !important; font-family: Arial, sans-serif; color: #000; }
    .cook-print-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 14px; }
    .cook-print-header h1 { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
    .cook-print-header p  { font-size: 11px; color: #555; }
    .cook-print-section { margin-bottom: 14px; }
    .cook-print-section h2 { font-size: 14px; font-weight: 700; border-bottom: 1px solid #aaa; padding-bottom: 4px; margin-bottom: 6px; }
    .cook-print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .cook-print-table tr td { padding: 5px 8px; border: 1px solid #ccc; }
    .cook-print-table tr td:last-child { text-align: right; font-weight: 700; font-size: 14px; min-width: 50px; }
    .cook-print-table .total-row td { background: #f0f0f0 !important; font-weight: 800 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .cook-print-grand {
      background: #1a6b3a !important; color: #fff !important;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
      border-radius: 6px; padding: 8px 12px;
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 10px; font-size: 14px; font-weight: 800;
    }
    .cook-print-footer { margin-top: 18px; border-top: 1px dashed #aaa; padding-top: 8px; font-size: 10px; color: #888; text-align: center; }
  }
</style>

<!-- ── COOK SHEET TAB PANEL ────────────────────────────────────────────────── -->
<div id="tab-cook" class="tab-panel">
  <div class="cook-card">
    <div class="cook-header">
      <div class="cook-header-left">
        <div class="cook-header-icon">🍳</div>
        <div>
          <h2>Cook's Daily Sheet</h2>
          <p id="cook-header-date">Select a date to generate the sheet</p>
        </div>
      </div>
      <div class="cook-date-bar">
        <input type="date" id="cook-date-picker" onchange="loadCookSheet()">
        <button class="cook-refresh-btn" onclick="loadCookSheet()">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
        <button class="cook-print-btn" onclick="printCookSheet()">
          <i class="fas fa-print"></i> Print
        </button>
      </div>
    </div>
    <div class="cook-sheet-body" id="cook-sheet-body">
      <div class="cook-loading">
        <i class="fas fa-spinner fa-spin"></i> Pick a date above to load the sheet…
      </div>
    </div>
  </div>
</div>

<!-- Hidden print-only target -->
<div id="cook-print-target" style="display:none"></div>

<script>
// ── Cook Sheet Logic ──────────────────────────────────────────────────────────

// Default date picker to today
(function () {
  const today = new Date();
  const yyyy  = today.getFullYear();
  const mm    = String(today.getMonth() + 1).padStart(2, '0');
  const dd    = String(today.getDate()).padStart(2, '0');
  document.getElementById('cook-date-picker').value = `${yyyy}-${mm}-${dd}`;
})();

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

async function loadCookSheet() {
  const dateVal = document.getElementById('cook-date-picker').value;
  if (!dateVal) return;

  const body = document.getElementById('cook-sheet-body');
  body.innerHTML = '<div class="cook-loading"><i class="fas fa-spinner fa-spin"></i> Loading…</div>';

  try {
    const res  = await fetch(`/manager/cook_sheet?date=${encodeURIComponent(dateVal)}`);
    const data = await res.json();

    if (!data.ok) {
      body.innerHTML = `<div class="cook-loading" style="color:var(--danger)">${data.msg || 'Failed to load.'}</div>`;
      return;
    }

    document.getElementById('cook-header-date').textContent = fmtDate(dateVal);

    const { lunch, dinner, floor_lunch, floor_dinner } = data;
    const grandTotal = (lunch.total || 0) + (dinner.total || 0);

    function floorRows(floors) {
      if (!floors || floors.length === 0) return '';
      return floors.filter(f => f.floor).map(f => `
        <div class="cook-row floor-row">
          <span class="row-label"><i class="fas fa-layer-group"></i> Floor ${f.floor}</span>
          <span class="row-count">${f.count}</span>
        </div>`).join('');
    }

    body.innerHTML = `
      <div class="meal-section">
        <div class="meal-section-header">
          <div class="meal-section-icon lunch">🌤️</div>
          <span class="meal-section-title">Lunch</span>
          <span class="meal-section-total">${lunch.total}</span>
        </div>
        <div class="cook-row total-row">
          <span class="row-label"><i class="fas fa-users"></i> Total Lunch</span>
          <span class="row-count">${lunch.total}</span>
        </div>
        <div class="cook-row female-row">
          <span class="row-label"><i class="fas fa-venus"></i> Female</span>
          <span class="row-count">${lunch.female}</span>
        </div>
        <div class="cook-row" style="background:var(--primary-pale);border-color:#b7e4c7">
          <span class="row-label" style="color:var(--primary)"><i class="fas fa-mars"></i> Male (all floors)</span>
          <span class="row-count" style="color:var(--primary)">${lunch.male}</span>
        </div>
        ${floorRows(floor_lunch)}
      </div>

      <div class="meal-section">
        <div class="meal-section-header">
          <div class="meal-section-icon dinner">🌙</div>
          <span class="meal-section-title">Dinner</span>
          <span class="meal-section-total">${dinner.total}</span>
        </div>
        <div class="cook-row total-row">
          <span class="row-label"><i class="fas fa-users"></i> Total Dinner</span>
          <span class="row-count">${dinner.total}</span>
        </div>
        <div class="cook-row female-row">
          <span class="row-label"><i class="fas fa-venus"></i> Female</span>
          <span class="row-count">${dinner.female}</span>
        </div>
        <div class="cook-row" style="background:var(--primary-pale);border-color:#b7e4c7">
          <span class="row-label" style="color:var(--primary)"><i class="fas fa-mars"></i> Male (all floors)</span>
          <span class="row-count" style="color:var(--primary)">${dinner.male}</span>
        </div>
        ${floorRows(floor_dinner)}
      </div>

      <div class="cook-grand-total">
        <span class="gt-label">🍽️ Grand Total Meals Today</span>
        <span class="gt-count">${grandTotal}</span>
      </div>

      <div style="margin-top:12px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px">
        <i class="fas fa-clock"></i> Last refreshed: ${new Date().toLocaleTimeString()}
        &nbsp;·&nbsp; Click <strong>Print</strong> to hand to cook.
      </div>`;

    _cookSheetPrintData = { dateVal, lunch, dinner, floor_lunch, floor_dinner, grandTotal };

  } catch(e) {
    body.innerHTML = `<div class="cook-loading" style="color:var(--danger)"><i class="fas fa-exclamation-triangle"></i> Network error. Please try again.</div>`;
  }
}

let _cookSheetPrintData = null;

function printCookSheet() {
  const d = _cookSheetPrintData;
  if (!d) { toast('Load the sheet first before printing.', 'error'); return; }

  function floorTableRows(floors) {
    if (!floors || floors.length === 0) return '';
    return floors.filter(f => f.floor).map(f =>
      `<tr><td>Floor ${f.floor}</td><td>${f.count}</td></tr>`
    ).join('');
  }

  const printHTML = `
    <div class="cook-print-header">
      <h1>Netrokona Medical — Cook Sheet</h1>
      <p>Date: <strong>${fmtDate(d.dateVal)}</strong> &nbsp;·&nbsp; Printed: ${new Date().toLocaleString()}</p>
    </div>
    <div class="cook-print-section">
      <h2>🌤️ LUNCH — Total: ${d.lunch.total}</h2>
      <table class="cook-print-table">
        <tr><td>Total</td><td>${d.lunch.total}</td></tr>
        <tr><td>Female</td><td>${d.lunch.female}</td></tr>
        <tr><td>Male</td><td>${d.lunch.male}</td></tr>
        ${floorTableRows(d.floor_lunch)}
      </table>
    </div>
    <div class="cook-print-section">
      <h2>🌙 DINNER — Total: ${d.dinner.total}</h2>
      <table class="cook-print-table">
        <tr><td>Total</td><td>${d.dinner.total}</td></tr>
        <tr><td>Female</td><td>${d.dinner.female}</td></tr>
        <tr><td>Male</td><td>${d.dinner.male}</td></tr>
        ${floorTableRows(d.floor_dinner)}
      </table>
    </div>
    <div class="cook-print-grand">
      <span>🍽️ Grand Total Meals</span>
      <span>${d.grandTotal}</span>
    </div>
    <div class="cook-print-footer">
      NMMS — Netrokona Medical Meal Management System
    </div>`;

  const target = document.getElementById('cook-print-target');
  target.innerHTML = printHTML;
  target.style.display = 'block';
  window.print();
  target.style.display = 'none';
}
</script>
